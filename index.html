<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <title>منظومة المشاريع والتقارير اليومية</title>
  <style>
        :root{
      --primary:#183f4a;
      --primary-2:#1f5861;
      --accent:#cda24f;
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#1f2d3d;
      --muted:#6b7c93;
      --border:#dde5ee;
      --success:#1f8f5f;
      --shadow:0 14px 40px rgba(24,63,74,.10);
      --radius:18px;
      --dark:#221d22;
      --accent-2:#35b8c4;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Tajawal","Segoe UI",Tahoma,Arial,sans-serif;
      background:linear-gradient(135deg,#eef3f8 0%,#f9fbfd 100%);
      color:var(--text);
    }
    .hidden{display:none !important}

    .app-slim-mode #page-expenses,
    .app-slim-mode #page-contract-requests,
    .app-slim-mode #page-contracts,
    .app-slim-mode #page-claims,
    .app-slim-mode #page-dashboard,
    .app-slim-mode #page-records-expenses,
    .app-slim-mode #page-records-contract-requests,
    .app-slim-mode #page-records-contracts,
    .app-slim-mode #page-approved-contracts,
    .app-slim-mode #page-records-claims{
      display:none !important;
    }
    .app-shell{min-height:100vh}
    .login-page{
      min-height:100vh;
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:0;
    }
    .login-panel{
      background:var(--card);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
    }
    .login-card{
      width:min(520px,100%);
      background:#fff;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      border-radius:28px;
      padding:34px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }
    .brand-badge{
      width:52px;height:52px;border-radius:14px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;display:grid;place-items:center;font-size:22px;font-weight:700;
    }
    h1,h2,h3,p{margin:0}
    .subtitle{color:var(--muted); margin:10px 0 26px; line-height:1.8}
    .form-group{margin-bottom:18px}
    label{display:block; font-size:14px; margin-bottom:8px; color:#375066}
    input{
      width:100%;
      height:50px;
      border:1px solid var(--border);
      border-radius:14px;
      padding:0 16px;
      font-size:15px;
      background:#fbfdff;
      outline:none;
      font-family:"Tajawal","Segoe UI",Tahoma,Arial,sans-serif;
      font-weight:500;
    }
    input:focus{border-color:var(--primary)}
    .btn{
      width:100%;
      height:52px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      font-size:16px;
      cursor:pointer;
      font-weight:700;
    }
    .helper{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      background:#f7fafc;
      border:1px dashed var(--border);
      padding:12px 14px;
      border-radius:12px;
    }
  </style>
</head>
<body>
  <div style="padding:40px;text-align:center;font-family:Tajawal,Arial,sans-serif">
    <h1>تم رفع الموقع بنجاح</h1>
    <p>هذه نسخة أولية من ملف المنظومة على GitHub Pages.</p>
    <p>يمكن استبدال هذا المحتوى بالنسخة الكاملة لاحقًا.</p>
  </div>
</body>
</html>
