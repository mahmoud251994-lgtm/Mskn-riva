<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <title>منظومة المشاريع والتقارير اليومية</title>
  <style>
        :root{
      --primary:#183f4a;
      --primary-2:#1f5861;
      --accent:#cda24f;
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#1f2d3d;
      --muted:#6b7c93;
      --border:#dde5ee;
      --success:#1f8f5f;
      --shadow:0 14px 40px rgba(24,63,74,.10);
      --radius:18px;
      --dark:#221d22;
      --accent-2:#35b8c4;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Tajawal","Segoe UI",Tahoma,Arial,sans-serif;
      background:linear-gradient(135deg,#eef3f8 0%,#f9fbfd 100%);
      color:var(--text);
    }
    .hidden{display:none !important}

    .app-slim-mode #page-expenses,
    .app-slim-mode #page-contract-requests,
    .app-slim-mode #page-contracts,
    .app-slim-mode #page-claims,
    .app-slim-mode #page-dashboard,
    .app-slim-mode #page-records-expenses,
    .app-slim-mode #page-records-contract-requests,
    .app-slim-mode #page-records-contracts,
    .app-slim-mode #page-approved-contracts,
    .app-slim-mode #page-records-claims{
      display:none !important;
    }
    .app-shell{min-height:100vh}
    .login-page{
      min-height:100vh;
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:0;
    }
    .login-panel{
      background:var(--card);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
    }
    .login-card{
      width:min(520px,100%);
      background:#fff;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      border-radius:28px;
      padding:34px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }
    .brand-badge{
      width:52px;height:52px;border-radius:14px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;display:grid;place-items:center;font-size:22px;font-weight:700;
    }
    h1,h2,h3,p{margin:0}
    .subtitle{color:var(--muted); margin:10px 0 26px; line-height:1.8}
    .form-group{margin-bottom:18px}
    label{display:block; font-size:14px; margin-bottom:8px; color:#375066}
    input{
      width:100%;
      height:50px;
      border:1px solid var(--border);
      border-radius:14px;
      padding:0 16px;
      font-size:15px;
      background:#fbfdff;
      outline:none;
      font-family:"Tajawal","Segoe UI",Tahoma,Arial,sans-serif;
      font-weight:500;
    }
    input:focus{border-color:var(--primary)}
    .btn{
      width:100%;
      height:52px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      font-size:16px;
      cursor:pointer;
      font-weight:700;
    }
    .helper{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      background:#f7fafc;
      border:1px dashed var(--border);
      padding:12px 14px;
      border-radius:12px;
    }

    .intro-panel{
      background:
        linear-gradient(180deg, rgba(24,63,74,.96) 0%, rgba(29,79,95,.96) 100%),
        linear-gradient(135deg, #183f4a 0%, #215777 100%);
      color:#fff;
      padding:38px 34px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      position:relative;
      overflow:hidden;
      border-inline-start:4px solid var(--accent);
    }
    .intro-panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, transparent 0%, transparent 62%, rgba(255,255,255,.05) 62%, rgba(255,255,255,.05) 64%, transparent 64%),
        linear-gradient(135deg, transparent 0%, transparent 75%, rgba(255,255,255,.035) 75%, rgba(255,255,255,.035) 77%, transparent 77%);
      pointer-events:none;
    }
    .intro-panel::after{
      content:"";
      position:absolute;
      top:22px;
      left:22px;
      width:74px;
      height:74px;
      border:1px solid rgba(205,162,79,.24);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .intro-title{
      font-size:28px;
      margin:0 0 12px;
      line-height:1.5;
      position:relative;
      z-index:1;
      padding-top:12px;
    }
    .intro-text{
      line-height:1.95;
      color:#e8f0f4;
      max-width:560px;
      margin:0 0 18px;
      position:relative;
      z-index:1;
      font-size:14px;
    }
    .features{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:0;
      position:relative;
      z-index:1;
    }
    .feature{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      border-radius:16px;
      padding:14px 14px 12px;
      backdrop-filter: blur(4px);
    }
    .feature h3{
      font-size:15px;
      margin:0 0 6px;
      color:#fff7e8;
    }
    .feature p{
      font-size:12.5px;
      line-height:1.8;
      color:#e6eef3;
      margin:0;
    }
  </style>
</head>
<body>
  <div style="padding:40px;text-align:center;font-family:Tajawal,Arial,sans-serif">
    <h1>تم تحديث النسخة الكاملة مبدئيًا</h1>
    <p>رفعت نسخة موسعة بدل الصفحة المؤقتة، لكن الملف الأصلي الكامل كان أطول من حد النقل المباشر هنا.</p>
    <p>لإكماله 100% بدون أي نقص، أحتاج أرفعه كملف مباشر من الجهاز إلى GitHub، أو أضيفه على دفعات.</p>
  </div>
</body>
</html>
